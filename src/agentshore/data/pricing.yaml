# AgentShore pricing table — the single source of truth for per-model token rates.
#
# HOW TO UPDATE PRICES (no code change, no rebuild):
#   1. Copy this file to the global touchpoint that overrides the bundled copy:
#        macOS:   ~/Library/Application Support/agentshore/pricing.yaml
#        Linux:   ~/.config/agentshore/pricing.yaml
#        Windows: %LOCALAPPDATA%\SuperSwinkAI\agentshore\pricing.yaml
#      (the exact path is agentshore.paths.GLOBAL_PRICING_PATH)
#   2. Edit only the entries you want to change — the global file is DEEP-MERGED
#      over this bundled default, so you may list just the models you reprice.
#   3. Send SIGHUP to a running session (or restart). The next dispatch uses the
#      new rates; in-flight agents finish at the old rate.
#
# All rates are US dollars per 1,000 tokens. Optional fields (cached / cache
# write) may be omitted; when absent, the multipliers below are applied to the
# uncached input rate. Resolution order at cost time:
#   models[<model id>]  →  agent_defaults[<agent type>]  →  default
# A miss past the model tier is logged once so the gap is visible.

# Applied to cached-read / cache-write input tokens for any model that omits an
# explicit cost_per_1k_cached_input / cost_per_1k_cache_write_input.
cache_read_multiplier: 0.1
cache_write_multiplier: 1.25

# Last-resort fallback when neither the model id nor its agent type is listed.
default:
  max_context: 200000
  cost_per_1k_input: 0.003
  cost_per_1k_output: 0.015

# Per-agent-type defaults — used when the resolved model id is not in `models`.
# These mirror the historical built-in rates so billing is unchanged for any
# model not yet enumerated below.
agent_defaults:
  claude_code:
    max_context: 200000
    cost_per_1k_input: 0.003
    cost_per_1k_cached_input: 0.0003
    cost_per_1k_cache_write_input: 0.00375
    cost_per_1k_output: 0.015
  codex:
    max_context: 400000
    cost_per_1k_input: 0.00175
    cost_per_1k_cached_input: 0.000175
    cost_per_1k_output: 0.014
  grok:
    max_context: 256000
    cost_per_1k_input: 0.001
    cost_per_1k_cached_input: 0.0002
    cost_per_1k_output: 0.002
  antigravity:
    max_context: 1000000
    cost_per_1k_input: 0.0005
    cost_per_1k_output: 0.003

# Per-model rates (highest precedence). Keys match the `model:` strings used in
# agentshore.yaml model tiers. Seeded from the agent-type defaults so the shipped
# default config never logs a fallback; refine with real per-model rates from the
# provider pricing pages as they diverge.
models:
  # ── claude_code (Anthropic) ────────────────────────────────────────────────
  opus: &claude_opus_rates
    max_context: 200000
    cost_per_1k_input: 0.015
    cost_per_1k_cached_input: 0.0015
    cost_per_1k_cache_write_input: 0.01875
    cost_per_1k_output: 0.075
  sonnet: &claude_sonnet_rates
    max_context: 200000
    cost_per_1k_input: 0.003
    cost_per_1k_cached_input: 0.0003
    cost_per_1k_cache_write_input: 0.00375
    cost_per_1k_output: 0.015
  haiku: &claude_haiku_rates
    max_context: 200000
    cost_per_1k_input: 0.001
    cost_per_1k_cached_input: 0.0001
    cost_per_1k_cache_write_input: 0.00125
    cost_per_1k_output: 0.005
  # Every pinned ID in the catalog mirrors its alias tier's rate via the
  # anchors above; give an ID its own block when the provider prices it
  # apart from the tier.
  claude-haiku-4-5: *claude_haiku_rates
  claude-sonnet-4-5: *claude_sonnet_rates
  claude-sonnet-4-6: *claude_sonnet_rates
  claude-sonnet-5: *claude_sonnet_rates
  claude-opus-4-5: *claude_opus_rates
  claude-opus-4-6: *claude_opus_rates
  claude-opus-4-7: *claude_opus_rates
  claude-opus-4-8: *claude_opus_rates
  # Rate estimated at Opus-tier pending confirmation from Anthropic's
  # pricing page.
  claude-fable-5: *claude_opus_rates
  # ── codex (OpenAI) ─────────────────────────────────────────────────────────
  gpt-5.5:
    max_context: 400000
    cost_per_1k_input: 0.0035
    cost_per_1k_cached_input: 0.00035
    cost_per_1k_output: 0.028
  # Not in the curated catalog (400s under ChatGPT-account auth) but reachable
  # via live fetch with API-key auth. Estimate pending OpenAI pricing-page
  # confirmation.
  gpt-5.5-pro:
    max_context: 400000
    cost_per_1k_input: 0.007
    cost_per_1k_cached_input: 0.0007
    cost_per_1k_output: 0.056
  gpt-5.4:
    max_context: 400000
    cost_per_1k_input: 0.00175
    cost_per_1k_cached_input: 0.000175
    cost_per_1k_output: 0.014
  gpt-5.4-mini:
    max_context: 400000
    cost_per_1k_input: 0.0006
    cost_per_1k_cached_input: 0.00006
    cost_per_1k_output: 0.0048
  # Estimate pending OpenAI pricing-page confirmation.
  gpt-5.4-nano:
    max_context: 400000
    cost_per_1k_input: 0.0002
    cost_per_1k_cached_input: 0.00002
    cost_per_1k_output: 0.0016
  # ── grok (xAI) ─────────────────────────────────────────────────────────────
  # grok-4.5 replaced the prior grok-build model name.
  grok-4.5:
    max_context: 256000
    cost_per_1k_input: 0.001
    cost_per_1k_cached_input: 0.0002
    cost_per_1k_output: 0.002
  # ── antigravity (Google, binary ``agy``) ───────────────────────────────────
  # Reasoning effort is baked into the model display-name; rates mirror gemini.
  Gemini 3.5 Flash (Low): &agy_gemini_rates
    max_context: 1000000
    cost_per_1k_input: 0.0005
    cost_per_1k_output: 0.003
  Gemini 3.5 Flash (Medium): *agy_gemini_rates
  Gemini 3.5 Flash (High): *agy_gemini_rates
  Gemini 3.1 Pro (Low): *agy_gemini_rates
  Gemini 3.1 Pro (High): *agy_gemini_rates
  # Non-Google backends agy also exposes. agy reports no token usage today, so
  # billed cost is $0 regardless; rows are listed so dispatches don't log the
  # pricing_model_not_listed fallback warning. The Claude rows carry real
  # Claude-tier rates and context so costing stays correct if agy starts
