name: Installer — Windows

# Tag-triggered Windows installer build.
# No Authenticode signing yet (cert not acquired).
# TODO: add signing step here when cert + AZURE_KEY_VAULT_URI / WINDOWS_SIGNING_CERT
#       secrets are configured.

on:
  push:
    tags:
      - "v[0-9]+.[0-9]+.[0-9]+"

jobs:
  build-windows:
    name: Build Windows installer
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v4

      - uses: astral-sh/setup-uv@38f3f104447c67c051c4a08e39b64a148898af3a # v4
        with:
          python-version: "3.12"

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: "22"
          cache: "npm"

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Install Python dependencies
        run: uv sync --group dev --locked

      - name: Install npm dependencies
        run: npm ci

      - name: Build Tauri (Windows)
        # NOTE: produces an unsigned .msi and .exe; SmartScreen warning expected until
        # Authenticode signing is wired in (TODO above).
        # `-- -- --locked` forwards --locked through npm → tauri → cargo so the
        # build fails if Cargo.lock is stale (no silent dependency re-resolve).
        run: npm --prefix desktop run tauri build -- -- --locked
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}

      - name: Upload Windows installer artifacts
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: windows-installer
          path: |
            desktop/src-tauri/target/release/bundle/msi/*.msi
            desktop/src-tauri/target/release/bundle/nsis/*.exe
