name: Installer — Windows

# Tag-triggered Windows installer build.
# No Authenticode signing yet (cert not acquired).
# TODO: add signing step here when cert + AZURE_KEY_VAULT_URI / WINDOWS_SIGNING_CERT
#       secrets are configured. Pass -CertificateThumbprint / remove -NoSign at that point.

on:
  push:
    tags:
      - "v[0-9]+.[0-9]+.[0-9]+"

jobs:
  build-windows:
    name: Build Windows installer
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v4

      - uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0
        with:
          python-version: "3.12"

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: "22"
          cache: "npm"

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Install Python dependencies
        run: uv sync --group dev --locked

      - name: Install npm dependencies
        run: npm ci

      - name: Install Inno Setup 6
        run: choco install innosetup --yes --no-progress

      - name: Build Windows installer
        # --no-sign: Authenticode cert not yet provisioned in CI; see TODO above.
        # The build entrypoint is the Python spine (scripts/buildkit); run from repo root.
        shell: pwsh
        run: uv run python -m scripts.buildkit windows --no-sign

      - name: Upload Windows installer artifacts
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: windows-installer
          path: desktop/dist/AgentShoreSetup-*.exe
