name: Release — Windows

# Authenticode signing: set WINDOWS_SIGNING_CERT + WINDOWS_SIGNING_PASSWORD
# secrets and remove --no-sign when the cert is provisioned.

on:
  push:
    tags:
      - "v[0-9]+.[0-9]+.[0-9]+"

permissions:
  contents: write   # create/update GitHub Release

jobs:
  build-windows:
    name: Build Windows installer
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v4

      - uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0
        with:
          python-version: "3.12"

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: "22"
          cache: "npm"

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Install Python dependencies
        run: uv sync --group dev --locked

      - name: Install npm dependencies
        run: npm ci

      - name: Install Inno Setup 6
        run: choco install innosetup --yes --no-progress

      - name: Build Windows installer
        shell: pwsh
        run: uv run python -m scripts.buildkit windows --no-sign

      - name: Attach installer to GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          gh release create "${{ github.ref_name }}" \
            --title "${{ github.ref_name }}" \
            --generate-notes \
            --target main \
            || true
          gh release upload "${{ github.ref_name }}" \
            desktop/dist/AgentShoreSetup-*.exe --clobber
