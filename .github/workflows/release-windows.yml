name: Release — Windows

# Authenticode signing: set WINDOWS_SIGNING_CERT + WINDOWS_SIGNING_PASSWORD
# secrets and remove --no-sign when the cert is provisioned.

on:
  push:
    tags:
      - "v[0-9]+.[0-9]+.[0-9]+"

permissions:
  contents: write   # create/update GitHub Release

jobs:
  build-windows:
    name: Build Windows installer
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v4

      - uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990 # v8.3.2
        with:
          python-version: "3.12"
          version: "0.8.11"  # must match PINNED_UV_VERSION in scripts/buildkit/windows.py

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: "22"
          cache: "npm"

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Install Python dependencies
        run: uv sync --group dev --locked

      - name: Install npm dependencies
        run: npm ci

      - name: Install Inno Setup 6
        run: choco install innosetup --yes --no-progress

      - name: Build Windows installer
        shell: pwsh
        run: uv run python -m scripts.buildkit windows --no-sign

      - name: Attach installer to GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          # The Inno build emits a versioned name (AgentShoreSetup-<version>-x64.exe).
          versioned="$(ls desktop/dist/AgentShoreSetup-*-x64.exe | head -1)"
          if [ -z "$versioned" ]; then
            echo "No versioned AgentShoreSetup installer found in desktop/dist/" >&2
            exit 1
          fi
          # Publish a stable, version-less alias so the website can use the same
          # evergreen .../releases/latest/download/AgentShoreSetup-x64.exe URL as
          # macOS's AgentShore.pkg. The versioned asset is kept too as a
          # per-release archive. The version-less glob 'AgentShoreSetup-*-x64.exe'
          # only matches the versioned file, never this alias.
          cp "$versioned" desktop/dist/AgentShoreSetup-x64.exe
          gh release create "${{ github.ref_name }}" \
            --title "${{ github.ref_name }}" \
            --generate-notes \
            --target main \
            || true
          gh release upload "${{ github.ref_name }}" \
            "$versioned" \
            desktop/dist/AgentShoreSetup-x64.exe \
            --clobber
