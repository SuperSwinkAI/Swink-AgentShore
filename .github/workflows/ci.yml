name: CI

on:
  push:
    branches: [main, integration]
  pull_request:
    branches: [main, integration]

jobs:
  python:
    name: Python (ruff · mypy · pytest)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v4

      - uses: astral-sh/setup-uv@f0ec1fc3b38f5e7cd731e31a2e5b4c1cae8e6f46 # v4
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: uv sync --group dev

      - name: Lint (ruff)
        run: uv run ruff check src/ tests/

      - name: Type check (mypy)
        run: uv run mypy src/

      - name: Tests (pytest)
        run: uv run pytest tests/ -q --tb=short

  dashboard:
    name: Dashboard (vitest)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v4

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: "22"
          cache: "npm"

      - name: Install npm dependencies
        run: npm ci

      - name: Build dashboard lib
        run: npm --prefix dashboard run build:lib

      - name: Test dashboard
        run: npm --prefix dashboard run test:unit

  desktop:
    name: Desktop (vitest)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v4

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: "22"
          cache: "npm"

      - name: Install npm dependencies
        run: npm ci

      - name: Test desktop
        run: npm --prefix desktop run test
