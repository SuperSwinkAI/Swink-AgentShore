name: CI

on:
  push:
    branches: [main, integration]
  pull_request:
    branches: [main, integration]

jobs:
  python:
    name: Python (ruff · mypy · pytest)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v4

      - uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0
        with:
          python-version: "3.12"

      - name: Install dependencies
        # --locked: fail if uv.lock is stale vs pyproject.toml (no silent re-resolve)
        run: uv sync --group dev --locked

      - name: Lint (ruff)
        run: uv run ruff check src/ tests/

      - name: Type check (mypy)
        run: uv run mypy src/

      - name: Tests (pytest)
        # Skip tests that require external tooling not provisioned on the runner
        # (the bd/beads binary, the sqlite3 .recover CLI). They run locally where
        # the tooling exists; see tests/ci_support.py:requires_external_tooling.
        env:
          AGENTSHORE_SKIP_CI_UNSUPPORTED: "1"
        run: uv run pytest tests/ -q --tb=short

  dashboard:
    name: Dashboard (vitest)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v4

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: "22"
          cache: "npm"

      - name: Install npm dependencies
        run: npm ci

      - name: Build dashboard lib
        run: npm --prefix dashboard run build:lib

      - name: Test dashboard
        run: npm --prefix dashboard run test:unit

  desktop:
    name: Desktop (vitest)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v4

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: "22"
          cache: "npm"

      - name: Install npm dependencies
        run: npm ci

      - name: Test desktop
        run: npm --prefix desktop run test
