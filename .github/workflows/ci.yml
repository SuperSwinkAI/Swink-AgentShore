name: CI

on:
  push:
    branches: [main, integration]
  pull_request:
    branches: [main, integration]

permissions:
  contents: read  # default read-only; jobs that need write declare it explicitly

jobs:
  python:
    name: Python (ruff · mypy · pytest)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v4

      - uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990 # v8.3.2
        with:
          python-version: "3.12"

      - name: Install dependencies
        # --locked: fail if uv.lock is stale vs pyproject.toml (no silent re-resolve)
        run: uv sync --group dev --locked

      - name: Verify version single-source
        # pyproject.toml is canonical; fail fast if any mirror (Tauri config,
        # Cargo manifests, package.json files) has drifted. See
        # docs/design/build-pipeline-unification.md.
        run: uv run python -m scripts.buildkit version --check

      - name: Lint (ruff)
        run: uv run ruff check src/ tests/

      - name: Type check (mypy)
        run: uv run mypy src/

      - name: Tests (pytest)
        # Skip tests that require external tooling not provisioned on the runner
        # (the bd/beads binary, the sqlite3 .recover CLI). They run locally where
        # the tooling exists; see tests/ci_support.py:requires_external_tooling.
        env:
          AGENTSHORE_SKIP_CI_UNSUPPORTED: "1"
        run: uv run pytest tests/ -q --tb=short

  dashboard:
    name: Dashboard (vitest)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v4

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: "22"
          cache: "npm"

      - name: Install npm dependencies
        run: npm ci

      - name: Build dashboard lib
        run: npm --prefix dashboard run build:lib

      - name: Test dashboard
        run: npm --prefix dashboard run test:unit

  desktop:
    name: Desktop (vitest)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v4

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: "22"
          cache: "npm"

      - name: Install npm dependencies
        run: npm ci

      - name: Test desktop
        run: npm --prefix desktop run test

  desktop-compile:
    name: Desktop crate (cargo check · ${{ matrix.os }})
    # Compile gate for the Rust desktop workspace on both shipping targets. The
    # macOS/Windows .app/.exe builds never run in PR CI, so without this a Rust
    # regression in the desktop crate (e.g. a platform-gated function only
    # defined on one OS) reaches a local/tag build undetected — which is exactly
    # how the #105 provisioner compile error slipped through.
    #
    # `--no-default-features` drops Tauri's custom-protocol asset embedding (no
    # app code is gated on it), so the whole workspace type-checks WITHOUT a
    # built frontend, bd sidecar, or npm — keeping the gate to seconds. The
    # TAURI_CONFIG override empties externalBin so build.rs/tauri_build doesn't
    # require the (skipped) bd binary.
    strategy:
      fail-fast: false
      matrix:
        os: [macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v4

      # Rust version is pinned by rust-toolchain.toml; @stable just ensures
      # rustup is present and a baseline is installed.
      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
        with:
          workspaces: desktop/src-tauri

      - name: Compile desktop workspace (app + provisioner)
        working-directory: desktop/src-tauri
        env:
          AGENTSHORE_SKIP_BD_SIDECAR: "1"
          TAURI_CONFIG: '{"bundle":{"externalBin":[]}}'
        run: cargo check --locked --workspace --no-default-features

  windows-spine:
    name: Windows spine (import · parse · ps1 syntax)
    # The Windows build pipeline (scripts/buildkit/windows.py + the .ps1 shim +
    # _win_signing.ps1) can't be exercised from a macOS dev box, so validate on a
    # real Windows runner the parts a full Inno build would otherwise be the first
    # to catch: the Python spine imports + arg-parses on Windows, and both
    # PowerShell files parse. The full signed installer build remains the
    # tag-triggered installer-windows.yml job (now routed through this same spine).
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v4

      - uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990 # v8.3.2
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: uv sync --group dev --locked

      - name: Spine imports + CLI parse on Windows
        run: |
          uv run python -m scripts.buildkit windows --help
          uv run python -m scripts.buildkit version --check

      - name: Packaging guards (version · verify · windows installer)
        run: uv run pytest tests/packaging/ -q --no-cov

      - name: PowerShell parse (signing helper)
        shell: pwsh
        run: |
          $f = "scripts/buildkit/_win_signing.ps1"
          $errors = $null
          [System.Management.Automation.Language.Parser]::ParseFile($f, [ref]$null, [ref]$errors) | Out-Null
          if ($errors) { $errors | ForEach-Object { Write-Error $_ }; exit 1 }
          Write-Host "OK: $f"
